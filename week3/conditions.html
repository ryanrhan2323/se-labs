<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Week 3 - Conditions</title>
</head>
<body>
    <h1>JavaScript Conditions</h1>

    <script>
        var year = 2;

        document.write("<h2>If / Else If / Else</h2>");

        if (year == 1) {
            document.write("You are in year 1<br>");
        } else if (year == 2) {
            document.write("You are in year 2<br>");
        } else if (year == 3) {
            document.write("You are in year 3<br>");
        } else {
            document.write("Unknown year<br>");
        }

        document.write("<h2>Switch</h2>");

        switch (year) {
            case 1:
                document.write("You are in year 1<br>");
                break;
            case 2:
                document.write("You are in year 2<br>");
                break;
            case 3:
                document.write("You are in year 3<br>");
                break;
            default:
                document.write("Unknown year<br>");
        }
    </script>
</body>
</html>
