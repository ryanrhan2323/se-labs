<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Week 3 - Loops</title>
</head>
<body>
    <h1>JavaScript Loops</h1>

    <script>
        document.write("<h2>For loop: numbers 1 to 20</h2>");
        for (var i = 1; i <= 20; i++) {
            document.write(i + "<br>");
        }

        document.write("<h2>While loop: numbers 1 to 20</h2>");
        var j = 1;
        while (j <= 20) {
            document.write(j + "<br>");
            j++;
        }

        document.write("<h2>Array loop</h2>");
        var names = ["Roman", "Anna", "Kevin", "Lisa"];
        for (var name of names) {
            document.write(name + "<br>");
        }
    </script>
</body>
</html>
