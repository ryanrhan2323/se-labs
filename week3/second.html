<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Week 3 - Buttons</title>

    <script>
        function msg() {
            document.write("You clicked the button!");
        }

        function otherMsg() {
            document.write("Not that button!");
        }
    </script>

</head>

<body>

    <h1>Click the button!</h1>

    <input type="button" value="Click Me!" onclick="msg()">

    <input type="button" value="Other Button" onclick="otherMsg()">

</body>

</html>
